<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBill — Free Professional Invoice Generator</title>
<meta name="description" content="Create professional invoices in seconds. Free invoice generator with PDF download, multiple currencies, tax calculations, and more.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--p:#2563eb;--pd:#1d4ed8;--bg:#f1f5f9;--card:#fff;
--text:#334155;--muted:#94a3b8;--border:#e2e8f0;
--r:10px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,
'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);
min-height:100vh;-webkit-font-smoothing:antialiased}

/* ===== HEADER ===== */
.header{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;
padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(37,99,235,.3)}
.header h1{font-size:19px;font-weight:800;letter-spacing:-.5px;
display:flex;align-items:center;gap:8px}
.header nav{display:flex;gap:6px}
.header nav button{background:rgba(255,255,255,.15);color:#fff;border:none;
padding:8px 16px;border-radius:var(--r);cursor:pointer;font-size:13px;
font-weight:600;transition:all .2s;font-family:inherit}
.header nav button:hover,.header nav button.active{background:#fff;color:var(--p)}

/* ===== LAYOUT ===== */
.container{max-width:820px;margin:0 auto;padding:20px}
.view{display:none}.view.active{display:block}

/* ===== SECTIONS ===== */
.section{background:var(--card);border-radius:var(--r);padding:20px;
margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--border)}
.section h2{font-size:14px;font-weight:700;margin-bottom:16px;padding-bottom:10px;
border-bottom:2px solid var(--p);color:var(--p);text-transform:uppercase;
letter-spacing:.5px}

/* ===== FORMS ===== */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;
letter-spacing:.3px}
input,select,textarea{padding:10px 12px;border:1.5px solid var(--border);
border-radius:7px;font-size:14px;font-family:inherit;width:100%;
transition:all .2s;background:var(--card)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--p);
box-shadow:0 0 0 3px rgba(37,99,235,.1)}
textarea{resize:vertical;min-height:56px}
input[type="number"]{-moz-appearance:textfield}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{
-webkit-appearance:none;margin:0}

/* ===== LINE ITEMS ===== */
.item-labels{display:grid;grid-template-columns:2.5fr .8fr 1fr 1fr 36px;
gap:8px;margin-bottom:6px;padding:0 2px}
.item-labels span{font-size:11px;font-weight:700;color:var(--muted);
text-transform:uppercase;letter-spacing:.5px}
.line-item{display:grid;grid-template-columns:2.5fr .8fr 1fr 1fr 36px;
gap:8px;align-items:center;margin-bottom:8px}
.line-item input{padding:9px 10px;font-size:13px}
.line-item .amount{padding:9px 10px;background:var(--bg);border-radius:7px;
text-align:right;font-weight:700;font-size:13px;min-height:38px;
display:flex;align-items:center;justify-content:flex-end;
border:1.5px solid var(--border);color:var(--p)}
.remove-btn{background:none;border:none;color:var(--border);cursor:pointer;
font-size:22px;border-radius:7px;height:38px;width:36px;display:flex;
align-items:center;justify-content:center;transition:all .15s}
.remove-btn:hover{background:#fef2f2;color:#ef4444}

/* ===== TOTALS ===== */
.totals{margin-top:20px;display:flex;flex-direction:column;align-items:flex-end;
padding-top:16px;border-top:1.5px solid var(--border)}
.total-row{display:flex;justify-content:space-between;width:260px;
padding:5px 0;font-size:14px}
.total-row span:first-child{color:var(--muted)}
.total-row.grand{border-top:2px solid var(--text);padding-top:12px;
margin-top:8px;font-size:20px;font-weight:800}
.total-row.grand span{color:var(--p)}

/* ===== BUTTONS ===== */
.btn{padding:11px 22px;border:none;border-radius:var(--r);cursor:pointer;
font-size:14px;font-weight:600;font-family:inherit;transition:all .15s;
display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--p);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3)}
.btn-primary:hover{background:var(--pd)}
.btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:#fef2f2;color:#ef4444;border:1.5px solid #fecaca}
.btn-success{background:#f0fdf4;color:#16a34a;border:1.5px solid #bbf7d0}
.btn-block{width:100%;justify-content:center;margin-top:8px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
.generate-btn{font-size:16px;padding:16px 24px;margin-top:4px;
border-radius:12px;width:100%}

/* ===== INVOICE PREVIEW ===== */
.invoice-preview{background:#fff;max-width:800px;margin:0 auto;
padding:48px;box-shadow:0 4px 30px rgba(0,0,0,.08);border-radius:var(--r);
border:1px solid var(--border)}
.inv-header{display:flex;justify-content:space-between;align-items:flex-start;
margin-bottom:40px;gap:20px}
.inv-title{font-size:36px;font-weight:900;color:var(--p);letter-spacing:-1.5px;
line-height:1}
.inv-biz-name{font-size:17px;font-weight:700;margin-top:12px;margin-bottom:4px}
.inv-biz-details{font-size:12.5px;color:var(--muted);line-height:1.7}
.inv-meta{text-align:right;flex-shrink:0}
.inv-meta div{margin-bottom:5px;font-size:13px}
.inv-meta span{color:var(--muted)}
.inv-meta strong{color:var(--text);margin-left:4px}
.inv-addresses{display:grid;grid-template-columns:1fr 1fr;gap:30px;
margin-bottom:32px}
.inv-address-block h3{font-size:10px;text-transform:uppercase;
letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;font-weight:700}
.inv-address-block p{font-size:13.5px;line-height:1.7}
.inv-address-block strong{font-weight:700}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:28px}
.inv-table th{text-align:left;padding:11px 14px;font-size:10px;
text-transform:uppercase;letter-spacing:.8px;color:var(--muted);
background:var(--bg);font-weight:700}
.inv-table th:nth-child(2),.inv-table td:nth-child(2),
.inv-table th:nth-child(3),.inv-table td:nth-child(3),
.inv-table th:last-child,.inv-table td:last-child{text-align:right}
.inv-table td{padding:13px 14px;font-size:13.5px;
border-bottom:1px solid var(--border)}
.inv-table tbody tr:last-child td{border-bottom:none}
.inv-totals{display:flex;justify-content:flex-end}
.inv-totals table{width:260px;border-collapse:collapse}
.inv-totals td{padding:6px 0;font-size:13.5px}
.inv-totals td:last-child{text-align:right;font-weight:600}
.inv-totals tr.grand td{border-top:2px solid var(--text);font-size:20px;
font-weight:800;padding-top:12px;color:var(--p)}
.inv-notes{margin-top:32px;padding-top:20px;border-top:1.5px solid var(--border)}
.inv-notes h3{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;
color:var(--muted);margin-bottom:6px;font-weight:700}
.inv-notes p{font-size:12.5px;color:var(--muted);line-height:1.7}
.inv-watermark{text-align:center;margin-top:32px;padding-top:18px;
border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
.inv-watermark a{color:var(--p);text-decoration:none;font-weight:600}
.inv-watermark .pro-link{margin-left:6px;background:var(--p);color:#fff;
padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;
text-decoration:none;letter-spacing:.3px}

/* ===== SAVED INVOICES ===== */
.saved-item{background:var(--card);border-radius:var(--r);padding:16px 20px;
margin-bottom:10px;box-shadow:var(--shadow);display:flex;
justify-content:space-between;align-items:center;cursor:pointer;
transition:all .15s;border:1.5px solid var(--border)}
.saved-item:hover{border-color:var(--p);box-shadow:0 4px 12px rgba(37,99,235,.1)}
.saved-info h3{font-size:15px;font-weight:700}
.saved-info p{font-size:13px;color:var(--muted);margin-top:2px}
.saved-actions{display:flex;gap:6px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .icon{font-size:56px;margin-bottom:16px;opacity:.6}
.empty-state h3{margin-bottom:6px;font-size:18px;color:var(--text)}
.empty-state p{font-size:14px}
.saved-header{display:flex;justify-content:space-between;align-items:center;
margin-bottom:16px}
.saved-header h2{font-size:20px;font-weight:800;color:var(--text)}

/* ===== UPGRADE BANNER ===== */
.upgrade-banner{background:linear-gradient(135deg,#1e293b 0%,#334155 100%);
color:#fff;border-radius:var(--r);padding:20px;margin-bottom:14px;
text-align:center;border:1px solid #475569}
.upgrade-banner h3{font-size:15px;margin-bottom:4px;font-weight:700}
.upgrade-banner p{font-size:12.5px;opacity:.7;margin-bottom:14px}
.upgrade-banner .btn{background:#fbbf24;color:#1e293b;font-weight:700;
font-size:13px;padding:10px 24px}

/* ===== RESPONSIVE ===== */
@media(max-width:640px){
  .form-grid{grid-template-columns:1fr}
  .line-item{grid-template-columns:1fr 1fr 1fr;gap:6px}
  .line-item input:first-child{grid-column:1/-1}
  .line-item .amount{grid-column:span 2}
  .line-item .remove-btn{grid-row:1;grid-column:3;justify-self:end}
  .item-labels{display:none}
  .inv-header{flex-direction:column}
  .inv-meta{text-align:left}
  .inv-addresses{grid-template-columns:1fr}
  .invoice-preview{padding:24px 18px}
  .inv-title{font-size:28px}
  .header h1{font-size:16px}
  .container{padding:14px}
  .inv-table th,.inv-table td{padding:10px 8px;font-size:12px}
  .inv-totals table{width:200px}
  .total-row{width:100%}
}

/* ===== PRINT ===== */
@media print{
  body{background:#fff!important}
  .header,.btn-group,.upgrade-banner,.no-print{display:none!important}
  #createView,#savedView{display:none!important}
  #previewView{display:block!important}
  .invoice-preview{box-shadow:none!important;padding:0!important;
  margin:0!important;border:none!important;border-radius:0!important}
  .container{max-width:100%!important;padding:0!important}
  .inv-watermark .pro-link{display:none!important}
  @page{margin:12mm 15mm}
}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
background:var(--text);color:#fff;padding:12px 24px;border-radius:var(--r);
font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .3s;
box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>⚡ QuickBill</h1>
  <nav>
    <button class="active" onclick="showView('create',this)">+ Create</button>
    <button onclick="showView('saved',this)">Saved</button>
  </nav>
</div>

<!-- ===== CREATE VIEW ===== -->
<div id="createView" class="view active">
<div class="container">

  <!-- Upgrade Banner -->
  <div class="upgrade-banner no-print" id="upgradeBanner">
    <h3>🚀 Go Pro — Remove Watermark & Unlock Features</h3>
    <p>Logo upload · Custom colors · Recurring invoices · Priority support</p>
    <button class="btn" onclick="window.open('https://jacklenax.gumroad.com/l/httyu','_blank')">
      Upgrade for $19
    </button>
  </div>

  <!-- Invoice Details -->
  <div class="section">
    <h2>📄 Invoice Details</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Invoice Number</label>
        <input type="text" id="invNumber" value="INV-0001">
      </div>
      <div class="form-group">
        <label>Currency</label>
        <select id="currency" onchange="recalc()">
          <option value="$">USD ($)</option>
          <option value="€">EUR (€)</option>
          <option value="£">GBP (£)</option>
          <option value="$">AUD (A$)</option>
          <option value="$">CAD (C$)</option>
          <option value="¥">JPY (¥)</option>
          <option value="₹">INR (₹)</option>
          <option value="R">ZAR (R)</option>
          <option value="R$">BRL (R$)</option>
          <option value="CHF">CHF</option>
        </select>
      </div>
      <div class="form-group">
        <label>Invoice Date</label>
        <input type="date" id="invDate">
      </div>
      <div class="form-group">
        <label>Due Date</label>
        <input type="date" id="dueDate">
      </div>
    </div>
  </div>

  <!-- From -->
  <div class="section">
    <h2>🏢 From (Your Business)</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Business Name</label>
        <input type="text" id="bizName" placeholder="Your Business Name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="bizEmail" placeholder="you@business.com">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="bizPhone" placeholder="+1 (555) 123-4567">
      </div>
      <div class="form-group">
        <label>Website</label>
        <input type="text" id="bizWeb" placeholder="www.yourbusiness.com">
      </div>
      <div class="form-group full">
        <label>Address</label>
        <textarea id="bizAddress" rows="2"
          placeholder="123 Main Street&#10;City, State 12345"></textarea>
      </div>
    </div>
  </div>

  <!-- Bill To -->
  <div class="section">
    <h2>👤 Bill To (Client)</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Client Name</label>
        <input type="text" id="clientName" placeholder="Client or Company Name">
      </div>
      <div class="form-group">
        <label>Client Email</label>
        <input type="email" id="clientEmail" placeholder="client@company.com">
      </div>
      <div class="form-group">
        <label>Client Phone</label>
        <input type="tel" id="clientPhone" placeholder="+1 (555) 987-6543">
      </div>
      <div class="form-group full">
        <label>Client Address</label>
        <textarea id="clientAddress" rows="2"
          placeholder="456 Client Avenue&#10;City, State 67890"></textarea>
      </div>
    </div>
  </div>

  <!-- Line Items -->
  <div class="section">
    <h2>📦 Items & Services</h2>
    <div class="item-labels">
      <span>Description</span>
      <span>Qty</span>
      <span>Rate</span>
      <span>Amount</span>
      <span></span>
    </div>
    <div id="lineItems"></div>
    <button class="btn btn-secondary" onclick="addItem()" style="margin-top:4px">
      + Add Line Item
    </button>
    <div class="totals" id="totalsDisplay"></div>
  </div>

  <!-- Additional -->
  <div class="section">
    <h2>⚙️ Additional Details</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Discount (%)</label>
        <input type="number" id="discount" value="0" min="0" max="100"
          oninput="recalc()">
      </div>
      <div class="form-group">
        <label>Tax Rate (%)</label>
        <input type="number" id="taxRate" value="0" min="0"
          oninput="recalc()">
      </div>
      <div class="form-group full">
        <label>Notes / Payment Terms</label>
        <textarea id="notes" rows="3"
          placeholder="Payment is due within 30 days of invoice date. Please include the invoice number with your payment. Thank you for your business!"></textarea>
      </div>
    </div>
  </div>

  <button class="btn btn-primary generate-btn" onclick="generatePreview()">
    ⚡ Generate Invoice Preview
  </button>

</div>
</div>

<!-- ===== PREVIEW VIEW ===== -->
<div id="previewView" class="view">
<div class="container">
  <div class="btn-group no-print" style="margin-bottom:16px">
    <button class="btn btn-secondary" onclick="showView('create')">← Edit</button>
    <button class="btn btn-primary" onclick="printInvoice()">📄 Download PDF</button>
    <button class="btn btn-success" onclick="saveInvoice()">💾 Save</button>
    <button class="btn btn-secondary" onclick="newInvoice()">+ New</button>
  </div>
  <div id="invoiceOutput"></div>
</div>
</div>

<!-- ===== SAVED VIEW ===== -->
<div id="savedView" class="view">
<div class="container">
  <div class="saved-header">
    <h2>Saved Invoices</h2>
    <button class="btn btn-primary" onclick="showView('create')"
      style="font-size:13px;padding:8px 16px">+ New Invoice</button>
  </div>
  <div id="savedList"></div>
</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  QuickBill — Invoice Generator Engine
// ============================================================

let items = [];
let itemId = 0;

// ===== INIT =====
function init() {
  const today = new Date();
  document.getElementById('invDate').value = fmtDate(today);
  const due = new Date(today);
  due.setDate(due.getDate() + 30);
  document.getElementById('dueDate').value = fmtDate(due);
  addItem();
  loadBizDefaults();
  autoInvNumber();
}

function fmtDate(d) {
  return d.toISOString().split('T')[0];
}

function displayDate(d) {
  if (!d) return '';
  const [y, m, day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun',
                  'Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1] + ' ' + parseInt(day) + ', ' + y;
}

function autoInvNumber() {
  const saved = JSON.parse(localStorage.getItem('yp_invoices') || '[]');
  const num = String(saved.length + 1).padStart(4, '0');
  document.getElementById('invNumber').value = 'INV-' + num;
}

function loadBizDefaults() {
  const b = JSON.parse(localStorage.getItem('yp_biz') || 'null');
  if (!b) return;
  const fields = {bizName:'name',bizEmail:'email',bizPhone:'phone',
                   bizWeb:'web',bizAddress:'address'};
  for (const [elId, key] of Object.entries(fields)) {
    if (b[key]) document.getElementById(elId).value = b[key];
  }
}

function saveBizDefaults() {
  localStorage.setItem('yp_biz', JSON.stringify({
    name: v('bizName'), email: v('bizEmail'), phone: v('bizPhone'),
    web: v('bizWeb'), address: v('bizAddress')
  }));
}

function v(id) { return document.getElementById(id).value; }

// ===== LINE ITEMS =====
function addItem(desc='', qty=1, rate=0) {
  items.push({ id: ++itemId, desc, qty: Number(qty), rate: Number(rate) });
  renderItems();
}

function removeItem(id) {
  items = items.filter(i => i.id !== id);
  if (!items.length) addItem();
  else renderItems();
}

function updateItem(id, field, val) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  if (field === 'desc') item.desc = val;
  else item[field] = parseFloat(val) || 0;
  recalc();
}

function renderItems() {
  const c = document.getElementById('lineItems');
  const cur = v('currency');
  c.innerHTML = items.map(item => `
    <div class="line-item">
      <input type="text" placeholder="Item description" value="${esc(item.desc)}"
        oninput="updateItem(${item.id},'desc',this.value)">
      <input type="number" placeholder="Qty" value="${item.qty}" min="0" step="any"
        oninput="updateItem(${item.id},'qty',this.value)">
      <input type="number" placeholder="Rate" value="${item.rate}" min="0" step="any"
        oninput="updateItem(${item.id},'rate',this.value)">
      <div class="amount">${cur}${(item.qty * item.rate).toFixed(2)}</div>
      <button class="remove-btn" onclick="removeItem(${item.id})" title="Remove">×</button>
    </div>`).join('');
  recalc();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== CALCULATIONS =====
function recalc() {
  const cur = v('currency');
  const sub = items.reduce((s, i) => s + i.qty * i.rate, 0);
  const dPct = parseFloat(v('discount')) || 0;
  const dAmt = sub * dPct / 100;
  const after = sub - dAmt;
  const tPct = parseFloat(v('taxRate')) || 0;
  const tAmt = after * tPct / 100;
  const total = after + tAmt;

  let h = `<div class="total-row"><span>Subtotal</span>
    <span>${cur}${sub.toFixed(2)}</span></div>`;
  if (dPct > 0) h += `<div class="total-row"><span>Discount (${dPct}%)</span>
    <span>-${cur}${dAmt.toFixed(2)}</span></div>`;
  if (tPct > 0) h += `<div class="total-row"><span>Tax (${tPct}%)</span>
    <span>${cur}${tAmt.toFixed(2)}</span></div>`;
  h += `<div class="total-row grand"><span>Total</span>
    <span>${cur}${total.toFixed(2)}</span></div>`;

  document.getElementById('totalsDisplay').innerHTML = h;

  document.querySelectorAll('.line-item .amount').forEach((el, i) => {
    if (items[i]) el.textContent = cur + (items[i].qty * items[i].rate).toFixed(2);
  });
}

// ===== VIEWS =====
function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.header nav button').forEach(b => b.classList.remove('active'));

  const viewMap = { create: 'createView', preview: 'previewView', saved: 'savedView' };
  document.getElementById(viewMap[name]).classList.add('active');

  const btnIdx = name === 'create' ? 0 : name === 'saved' ? 1 : -1;
  if (btnIdx >= 0) document.querySelectorAll('.header nav button')[btnIdx].classList.add('active');
  if (name === 'saved') renderSaved();

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ===== GENERATE PREVIEW =====
function generatePreview() {
  saveBizDefaults();
  const cur = v('currency');
  const sub = items.reduce((s, i) => s + i.qty * i.rate, 0);
  const dPct = parseFloat(v('discount')) || 0;
  const dAmt = sub * dPct / 100;
  const after = sub - dAmt;
  const tPct = parseFloat(v('taxRate')) || 0;
  const tAmt = after * tPct / 100;
  const total = after + tAmt;

  const validItems = items.filter(i => i.desc || i.rate > 0);
  const rows = validItems.map(i => `<tr>
    <td>${esc(i.desc)}</td><td>${i.qty}</td>
    <td>${cur}${i.rate.toFixed(2)}</td>
    <td><strong>${cur}${(i.qty*i.rate).toFixed(2)}</strong></td>
  </tr>`).join('');

  let totRows = `<tr><td>Subtotal</td><td>${cur}${sub.toFixed(2)}</td></tr>`;
  if (dPct > 0) totRows += `<tr><td>Discount (${dPct}%)</td><td>-${cur}${dAmt.toFixed(2)}</td></tr>`;
  if (tPct > 0) totRows += `<tr><td>Tax (${tPct}%)</td><td>${cur}${tAmt.toFixed(2)}</td></tr>`;
  totRows += `<tr class="grand"><td>Total Due</td><td>${cur}${total.toFixed(2)}</td></tr>`;

  const notes = v('notes');
  const bAddr = v('bizAddress').replace(/\n/g, '<br>');
  const cAddr = v('clientAddress').replace(/\n/g, '<br>');
  const bizW = v('bizWeb');

  document.getElementById('invoiceOutput').innerHTML = `
  <div class="invoice-preview">
    <div class="inv-header">
      <div>
        <div class="inv-title">INVOICE</div>
        <div class="inv-biz-name">${esc(v('bizName'))}</div>
        <div class="inv-biz-details">
          ${bAddr ? bAddr + '<br>' : ''}
          ${v('bizEmail') ? esc(v('bizEmail')) + '<br>' : ''}
          ${v('bizPhone') ? esc(v('bizPhone')) + '<br>' : ''}
          ${bizW ? esc(bizW) : ''}
        </div>
      </div>
      <div class="inv-meta">
        <div><span>Invoice #</span><strong>${esc(v('invNumber'))}</strong></div>
        <div><span>Issued </span><strong>${displayDate(v('invDate'))}</strong></div>
        <div><span>Due </span><strong>${displayDate(v('dueDate'))}</strong></div>
      </div>
    </div>

    <div class="inv-addresses">
      <div class="inv-address-block">
        <h3>Bill To</h3>
        <p>
          <strong>${esc(v('clientName'))}</strong><br>
          ${cAddr ? cAddr + '<br>' : ''}
          ${v('clientEmail') ? esc(v('clientEmail')) + '<br>' : ''}
          ${v('clientPhone') ? esc(v('clientPhone')) : ''}
        </p>
      </div>
    </div>

    <table class="inv-table">
      <thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th>Amount</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>

    <div class="inv-totals"><table>${totRows}</table></div>

    ${notes ? `<div class="inv-notes"><h3>Notes / Terms</h3>
      <p>${esc(notes).replace(/\n/g,'<br>')}</p></div>` : ''}

    <div class="inv-watermark">
      Generated with <a href="#">QuickBill</a>
      <a href="YOUR_GUMROAD_LINK" target="_blank" class="pro-link">
        REMOVE WATERMARK → GO PRO
      </a>
    </div>
  </div>`;

  showView('preview');
}

// ===== PRINT / PDF =====
function printInvoice() { window.print(); }

// ===== SAVE / LOAD =====
function saveInvoice() {
  const data = gatherData();
  let inv = JSON.parse(localStorage.getItem('yp_invoices') || '[]');
  const idx = inv.findIndex(i => i.number === data.number);
  if (idx >= 0) inv[idx] = data; else inv.push(data);
  localStorage.setItem('yp_invoices', JSON.stringify(inv));
  toast('Invoice saved successfully!');
}

function gatherData() {
  const sub = items.reduce((s,i) => s + i.qty * i.rate, 0);
  const dPct = parseFloat(v('discount')) || 0;
  const tPct = parseFloat(v('taxRate')) || 0;
  const after = sub - sub * dPct / 100;
  const total = after + after * tPct / 100;
  return {
    number: v('invNumber'), date: v('invDate'), dueDate: v('dueDate'),
    currency: v('currency'), bizName: v('bizName'), bizEmail: v('bizEmail'),
    bizPhone: v('bizPhone'), bizWeb: v('bizWeb'), bizAddress: v('bizAddress'),
    clientName: v('clientName'), clientEmail: v('clientEmail'),
    clientPhone: v('clientPhone'), clientAddress: v('clientAddress'),
    items: items.map(i => ({desc:i.desc, qty:i.qty, rate:i.rate})),
    discount: v('discount'), taxRate: v('taxRate'), notes: v('notes'),
    total, savedAt: new Date().toISOString()
  };
}

function loadInvoice(number) {
  const inv = JSON.parse(localStorage.getItem('yp_invoices') || '[]')
    .find(i => i.number === number);
  if (!inv) return;

  const fields = {
    invNumber:'number', invDate:'date', dueDate:'dueDate', currency:'currency',
    bizName:'bizName', bizEmail:'bizEmail', bizPhone:'bizPhone', bizWeb:'bizWeb',
    bizAddress:'bizAddress', clientName:'clientName', clientEmail:'clientEmail',
    clientPhone:'clientPhone', clientAddress:'clientAddress',
    discount:'discount', taxRate:'taxRate', notes:'notes'
  };
  for (const [elId, key] of Object.entries(fields)) {
    document.getElementById(elId).value = inv[key] || '';
  }

  items = []; itemId = 0;
  (inv.items || []).forEach(i => addItem(i.desc, i.qty, i.rate));

  showView('create');
  toast('Invoice loaded');
}

function deleteInvoice(number, e) {
  e.stopPropagation();
  if (!confirm('Delete invoice ' + number + '?')) return;
  let inv = JSON.parse(localStorage.getItem('yp_invoices') || '[]');
  inv = inv.filter(i => i.number !== number);
  localStorage.setItem('yp_invoices', JSON.stringify(inv));
  renderSaved();
  toast('Invoice deleted');
}

function renderSaved() {
  const inv = JSON.parse(localStorage.getItem('yp_invoices') || '[]');
  const c = document.getElementById('savedList');
  if (!inv.length) {
    c.innerHTML = `<div class="empty-state">
      <div class="icon">📄</div>
      <h3>No saved invoices yet</h3>
      <p>Create your first invoice and it will appear here.</p>
    </div>`;
    return;
  }
  c.innerHTML = inv.slice().reverse().map(i => {
    const cur = i.currency || '$';
    return `<div class="saved-item" onclick="loadInvoice('${esc(i.number)}')">
      <div class="saved-info">
        <h3>${esc(i.number)} — ${esc(i.clientName || 'No client')}</h3>
        <p>${displayDate(i.date)} · <strong>${cur}${i.total ? i.total.toFixed(2) : '0.00'}</strong></p>
      </div>
      <div class="saved-actions">
        <button class="btn btn-danger" onclick="deleteInvoice('${esc(i.number)}',event)"
          style="padding:6px 14px;font-size:12px">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function newInvoice() {
  document.querySelectorAll('#createView input:not(#invNumber), #createView textarea')
    .forEach(el => {
      if (el.id === 'discount' || el.id === 'taxRate') el.value = '0';
      else if (el.type === 'date') {}
      else if (!['bizName','bizEmail','bizPhone','bizWeb','bizAddress'].includes(el.id))
        el.value = '';
    });
  items = []; itemId = 0;
  addItem();
  autoInvNumber();
  const today = new Date();
  document.getElementById('invDate').value = fmtDate(today);
  const due = new Date(today);
  due.setDate(due.getDate() + 30);
  document.getElementById('dueDate').value = fmtDate(due);
  loadBizDefaults();
  showView('create');
  toast('New invoice ready');
}

// ===== TOAST =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== START =====
init();
</script>
</body>
          </html>
